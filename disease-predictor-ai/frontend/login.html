<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — MediScan AI</title>

    <!-- DNS prefetch for faster external connections -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2300BFA6'/><path d='M10 50h18l12-30 18 60 12-30h20' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

    <!-- Fonts — non-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>

    <!-- CSS — only what's needed -->
    <link rel="stylesheet" href="css/login.css" />

    <!-- Supabase — preload so it's ready faster -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" as="script" crossorigin />
</head>
<body>

    <div class="bg" aria-hidden="true">
        <div class="bg-ring bg-ring-1"></div>
        <div class="bg-ring bg-ring-2"></div>
        <div class="bg-ring bg-ring-3"></div>
        <div class="bg-glow"></div>
        <div class="bg-dots"></div>
    </div>

    <main class="center">
        <div class="card" id="card">

            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                    </svg>
                </div>
                <span class="logo-name">MediScan AI</span>
            </div>

            <div class="heading">
                <h1 class="title" id="cardTitle">Welcome back</h1>
                <p class="subtitle" id="cardSub">Sign in to your health dashboard</p>
            </div>

            <div class="tabs" role="tablist">
                <button class="tab active" id="loginTab" role="tab">Login</button>
                <button class="tab" id="signupTab" role="tab">Sign Up</button>
            </div>

            <div class="fields">

                <div class="field" id="nameField" style="display:none">
                    <label class="label" for="nameInput">Full Name</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="4" /><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                        </svg>
                        <input type="text" id="nameInput" placeholder="Full name" autocomplete="name" />
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="emailInput">Email</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 7-10 7L2 7" />
                        </svg>
                        <input type="email" id="emailInput" placeholder="fa24-bcs-000@cuilahore.edu.pk" autocomplete="email" />
                    </div>
                </div>

                <div class="field">
                    <div class="label-row">
                        <label class="label" for="passInput">Password</label>
                        <button class="forgot-link" id="forgotBtn" type="button">Forgot password?</button>
                    </div>
                    <div class="input-wrap">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="passInput" placeholder="Password" autocomplete="current-password" />
                        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Toggle password">
                            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

            </div>

            <p class="msg" id="authMsg"></p>

            <button class="btn-main" id="authBtn">Login</button>

            <div class="divider"><span>or</span></div>

            <button class="btn-google" id="googleBtn">
                <svg width="17" height="17" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.6 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.4 13.6 17.7 9.5 24 9.5z" />
                    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.2-9.9 6.2-16.9z" />
                    <path fill="#FBBC05" d="M10.7 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7-5.4A23.9 23.9 0 0 0 1 24c0 3.8.9 7.5 2.7 10.7l7-5.4-.1.3z" />
                    <path fill="#34A853" d="M24 47c5.5 0 10.2-1.8 13.6-4.9l-7.4-5.7c-1.9 1.3-4.3 2.1-6.2 2.1-6.3 0-11.6-4.2-13.5-9.9l-7 5.4C7 41.3 14.8 47 24 47z" />
                </svg>
                Continue with Google
            </button>

            <p class="footer-note">
                By signing in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>
            </p>

        </div>
    </main>

    <!-- FORGOT PASSWORD MODAL -->
    <div class="modal-wrap" id="modal">
        <div class="modal">
            <button class="modal-x" id="modalClose" aria-label="Close">&times;</button>
            <h2 class="modal-title">Reset Password</h2>
            <p class="modal-sub">We'll email you a secure link to reset your password.</p>
            <div class="field">
                <label class="label" for="resetEmail">Email address</label>
                <div class="input-wrap">
                    <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 7-10 7L2 7" />
                    </svg>
                    <input type="email" id="resetEmail" placeholder="you@example.com" />
                </div>
            </div>
            <p class="msg" id="resetMsg" style="margin-top:.5rem"></p>
            <button class="btn-main" id="resetBtn" style="margin-top:.9rem">Send Reset Link</button>
        </div>
    </div>

    <!-- INLINE SCRIPTS — run immediately, no waiting -->
    <script>
        window.authMode = "login";

        const loginTab  = document.getElementById("loginTab");
        const signupTab = document.getElementById("signupTab");
        const authBtn   = document.getElementById("authBtn");
        const nameField = document.getElementById("nameField");
        const authMsg   = document.getElementById("authMsg");

        loginTab.onclick = () => {
            window.authMode = "login";
            loginTab.classList.add("active");
            signupTab.classList.remove("active");
            authBtn.textContent = "Login";
            nameField.style.display = "none";
            authMsg.textContent = ""; authMsg.className = "";
        };

        signupTab.onclick = () => {
            window.authMode = "signup";
            signupTab.classList.add("active");
            loginTab.classList.remove("active");
            authBtn.textContent = "Sign Up";
            nameField.style.display = "flex";
            authMsg.textContent = ""; authMsg.className = "";
        };

        // Eye toggle
        document.getElementById("eyeBtn").addEventListener("click", () => {
            const input = document.getElementById("passInput");
            const icon  = document.getElementById("eyeIcon");
            const show  = input.type === "password";
            input.type  = show ? "text" : "password";
            icon.innerHTML = show
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                   <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                   <line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                   <circle cx="12" cy="12" r="3"/>`;
        });

        // Enter key on email → focus password
        document.getElementById("emailInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("passInput").focus();
        });
    </script>

    <!-- Supabase — load with minified URL for smaller bundle -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
